<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>상가 전문 시공 가이드 | NAEBU INTERIOR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#111;
  color:#fff;
}

header{
  padding:100px 20px;
  text-align:center;
  background:#000;
}

header h1{
  font-size:40px;
  margin-bottom:20px;
}

header p{
  color:#aaa;
}

section{
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
}

.guide-block{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:center;
  margin-bottom:100px;
}

.guide-block img{
  width:100%;
  border-radius:12px;
}

.text-box h2{
  margin-bottom:20px;
}

.text-box ul{
  padding-left:20px;
  line-height:1.8;
  color:#ccc;
}

@media(max-width:900px){
  .guide-block{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>상가 전문 시공 가이드</h1>
  <p>업종에 맞는 목공 기반 구조와 마감 방향을 제안합니다.</p>
</header>

<section>

  <!-- 병원 -->
  <div class="guide-block">
    <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
    <div class="text-box">
      <h2>병원 · 의원</h2>
      <ul>
        <li>목공 가벽 + 방음 보강 구조</li>
        <li>깔끔한 도장 마감</li>
        <li>내구성 높은 타일 바닥</li>
        <li>위생과 안정감을 고려한 톤 설계</li>
      </ul>
    </div>
  </div>

  <!-- 카페 -->
  <div class="guide-block">
    <img src="https://images.unsplash.com/photo-1600566753051-ff0e40c3c2c4">
    <div class="text-box">
      <h2>카페 · 베이커리</h2>
      <ul>
        <li>오픈형 목공 구조</li>
        <li>우드 텍스처 마감</li>
        <li>간접조명 + 디자인 천장</li>
        <li>브랜드 분위기 중심 설계</li>
      </ul>
    </div>
  </div>

  <!-- 애견샵 -->
  <div class="guide-block">
    <img src="https://images.unsplash.com/photo-1558944351-cb8c3e4a7a44">
    <div class="text-box">
      <h2>애견샵 · 애견호텔</h2>
      <ul>
        <li>내구성 높은 목공 구조</li>
        <li>방수 기능성 바닥재</li>
        <li>청소 유지관리 고려 설계</li>
        <li>따뜻한 우드 + 파스텔톤 마감</li>
      </ul>
    </div>
  </div>

</section>

</body>
</html>
