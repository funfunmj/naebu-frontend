<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>주거 시공 가이드 | NAEBU INTERIOR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#111;
  color:#fff;
}

header{
  padding:100px 20px;
  text-align:center;
  background:#000;
}

header h1{
  font-size:40px;
  margin-bottom:20px;
}

header p{
  color:#aaa;
}

section{
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
}

.guide-block{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:center;
  margin-bottom:100px;
}

.guide-block img{
  width:100%;
  border-radius:12px;
}

.text-box h2{
  margin-bottom:20px;
}

.text-box ul{
  padding-left:20px;
  line-height:1.8;
  color:#ccc;
}

@media(max-width:900px){
  .guide-block{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>아파트 & 단독주택 시공 가이드</h1>
  <p>생활 동선과 분위기를 고려한 목공 기반 공간 설계</p>
</header>

<section>

  <!-- 거실 -->
  <div class="guide-block">
    <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
    <div class="text-box">
      <h2>거실</h2>
      <ul>
        <li>목공 아트월 구조</li>
        <li>무광 도장 또는 텍스처 마감</li>
        <li>간접조명 설계</li>
        <li>톤 다운 컬러 기반 공간 안정감 연출</li>
      </ul>
    </div>
  </div>

  <!-- 주방 -->
  <div class="guide-block">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    <div class="text-box">
      <h2>주방</h2>
      <ul>
        <li>목공 상부장 구조 보강</li>
        <li>내열·내수 마감재 선택</li>
        <li>동선 중심 설계</li>
        <li>미니멀 또는 내추럴 스타일 적용</li>
      </ul>
    </div>
  </div>

  <!-- 침실 -->
  <div class="guide-block">
    <img src="https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf">
    <div class="text-box">
      <h2>침실</h2>
      <ul>
        <li>목공 가벽 활용 공간 분리</li>
        <li>부드러운 도장 마감</li>
        <li>간접조명 중심 설계</li>
        <li>편안함 중심 색감 구성</li>
      </ul>
    </div>
  </div>

</section>

</body>
</html>
